<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 600px;
  padding: 20px;
}

h1 {
  font-size: 40px;
}

p {
  color: #ccc;
  font-size: 18px;
}

button {
  margin-top: 30px;
  padding: 10px 25px;
  background: transparent;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="container" id="content"></div>

<script>
const pages = [

{
title: "For You",
text: "Not to convince you. Just to show you clearly."
},

{
title: "Where I went wrong",
text: "I reacted too fast.\nI didn’t understand you enough.\nMy actions didn’t match my words."
},

{
title: "What I’m changing",
text: "Understanding you more.\nControlling my reactions.\nFocusing on my routine.\nBeing consistent."
},

{
title: "What I understand",
text: "Trust comes from actions, not words.\nAnd I need to be better—not just for you,\nbut also in front of Harish uncle and Preeti aunty."
},

{
title: "One question",
text: "Do you feel there is still something here worth giving a chance to?",
buttons: true
}

];

let index = 0;

function renderPage() {
  let page = pages[index];

  let html = `<h1>${page.title}</h1>
              <p>${page.text.replace(/\n/g, "<br>")}</p>`;

  if (page.buttons) {
    html += `
      <button onclick="yes()">Yes</button>
      <button onclick="maybe()">I’m not sure</button>
    `;
  } else {
    html += `<button onclick="next()">Next</button>`;
  }

  document.getElementById("content").innerHTML = html;
}

function next() {
  index++;
  renderPage();
}

function yes() {
  document.getElementById("content").innerHTML = `
    <h1>Okay</h1>
    <p>I’ll prove it with time.</p>
  `;
}

function maybe() {
  document.getElementById("content").innerHTML = `
    <h1>It’s okay</h1>
    <p>Take your time. I’ll still improve.</p>
  `;
}

renderPage();
</script>

</body>
</html>
